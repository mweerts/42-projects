services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
  backend:
    build:
      context: ..
      dockerfile: services/backend/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - backend_data:/data
  frontend:
    build:
      context: ..
      dockerfile: services/frontend/Dockerfile
    environment:
      - NODE_ENV=production
    expose:
      - "80"
volumes:
  backend_data:
